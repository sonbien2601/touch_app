name: Touch CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web:
    name: Build and Deploy Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build
        run: dotnet build web/Touch.Web/Touch.Web.csproj --configuration Release

      - name: Publish
        run: dotnet publish web/Touch.Web/Touch.Web.csproj --configuration Release

      - name: Setup Node
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Firebase CLI
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npm install -g firebase-tools

      - name: Write Firebase service account
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TOUCHAPP }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "::error::Missing GitHub secret FIREBASE_SERVICE_ACCOUNT_TOUCHAPP"
            exit 1
          fi
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/firebase-service-account.json"

      - name: Deploy Firestore and Hosting
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
        run: firebase deploy --only firestore,hosting --project touchapp-65d7b --non-interactive
